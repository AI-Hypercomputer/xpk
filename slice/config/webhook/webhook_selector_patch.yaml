# This patch injects the objectSelector into the pod webhook.
# We use a patch because controller-gen markers do not support objectSelector.
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- name: mpod.accelerator.gke.io
  objectSelector:
    matchLabels:
      cloud.google.com/gke-tpu-slice-pod: "true"