kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: ClusterConfiguration
        apiVersion: kubeadm.k8s.io/v1beta3
        scheduler:
          extraArgs:
            v: "3"
        controllerManager:
          extraArgs:
            v: "3"
        apiServer:
          extraArgs:
            enable-aggregator-routing: "true"
            v: "3"
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            v: "3"
# For the purpose of subslice testing, the 4 worker nodes are going to simulate an 
# (almost) full cube. The topology looks as follows (the value in brackets is the
# number of TPUs on each node).
#                     
#  4x4x4                     b1
#                        /        \ 
#  2x4x4               c1           c2
#                    /     \         |
#  2x2x4           d1       d2       d3
#                /   \       |       |
#  2x2x2        e1    e2     e3      e4
#             /       |      |       |
#  2x2x1    f1 (4)    f2 (8) f3 (16) f4 (32)


  - role: worker # 1
    labels:
      cloud.google.com/gke-node-group: tas-group
      cloud.google.com/gke-tpu-accelerator: tpu7x
      cloud.google.com/gke-tpu-partition-4x4x4-state: HEALTHY
      cloud.google.com/gke-tpu-partition-2x4x4-state: HEALTHY
      cloud.google.com/gke-tpu-partition-2x2x4-state: HEALTHY
      cloud.google.com/gke-tpu-partition-2x2x2-state: HEALTHY
      cloud.google.com/gke-tpu-partition-2x2x1-state: HEALTHY
      cloud.google.com/gce-topology-block: a1
      cloud.google.com/gke-tpu-partition-4x4x4-id: b1
      cloud.google.com/gke-tpu-partition-2x4x4-id: c1
      cloud.google.com/gke-tpu-partition-2x2x4-id: d1
      cloud.google.com/gke-tpu-partition-2x2x2-id: e1
      cloud.google.com/gke-tpu-partition-2x2x1-id: f1
  - role: worker # 2
    labels:
      cloud.google.com/gke-node-group: tas-group
      cloud.google.com/gke-tpu-accelerator: tpu7x
      cloud.google.com/gke-tpu-partition-4x4x4-state: HEALTHY
      cloud.google.com/gke-tpu-partition-2x4x4-state: HEALTHY
      cloud.google.com/gke-tpu-partition-2x2x4-state: HEALTHY
      cloud.google.com/gke-tpu-partition-2x2x2-state: HEALTHY
      cloud.google.com/gke-tpu-partition-2x2x1-state: HEALTHY
      cloud.google.com/gce-topology-block: a1
      cloud.google.com/gke-tpu-partition-4x4x4-id: b1
      cloud.google.com/gke-tpu-partition-2x4x4-id: c1
      cloud.google.com/gke-tpu-partition-2x2x4-id: d1
      cloud.google.com/gke-tpu-partition-2x2x2-id: e2
      cloud.google.com/gke-tpu-partition-2x2x1-id: f2
  - role: worker # 3
    labels:
      cloud.google.com/gke-node-group: tas-group
      cloud.google.com/gke-tpu-accelerator: tpu7x
      cloud.google.com/gke-tpu-partition-4x4x4-state: HEALTHY
      cloud.google.com/gke-tpu-partition-2x4x4-state: HEALTHY
      cloud.google.com/gke-tpu-partition-2x2x4-state: HEALTHY
      cloud.google.com/gke-tpu-partition-2x2x2-state: HEALTHY
      cloud.google.com/gke-tpu-partition-2x2x1-state: HEALTHY
      cloud.google.com/gce-topology-block: a1
      cloud.google.com/gke-tpu-partition-4x4x4-id: b1
      cloud.google.com/gke-tpu-partition-2x4x4-id: c1
      cloud.google.com/gke-tpu-partition-2x2x4-id: d2
      cloud.google.com/gke-tpu-partition-2x2x2-id: e3
      cloud.google.com/gke-tpu-partition-2x2x1-id: f3
  - role: worker # 4
    labels:
      cloud.google.com/gke-node-group: tas-group
      cloud.google.com/gke-tpu-accelerator: tpu7x
      cloud.google.com/gke-tpu-partition-4x4x4-state: HEALTHY
      cloud.google.com/gke-tpu-partition-2x4x4-state: HEALTHY
      cloud.google.com/gke-tpu-partition-2x2x4-state: HEALTHY
      cloud.google.com/gke-tpu-partition-2x2x2-state: HEALTHY
      cloud.google.com/gke-tpu-partition-2x2x1-state: HEALTHY
      cloud.google.com/gce-topology-block: a1
      cloud.google.com/gke-tpu-partition-4x4x4-id: b1
      cloud.google.com/gke-tpu-partition-2x4x4-id: c2
      cloud.google.com/gke-tpu-partition-2x2x4-id: d3
      cloud.google.com/gke-tpu-partition-2x2x2-id: e4
      cloud.google.com/gke-tpu-partition-2x2x1-id: f4
kubeadmConfigPatches:
  - |
    kind: JoinConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        v: "3"
